name: Build MT7981 U-Boot CMCC RAX3000M NAND
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 核心步骤：强制同步并拉取所有子模块远端最新代码
      - name: Refresh submodules to latest remote
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --remote
          git submodule status

      - name: Install compile dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-aarch64-linux-gnu flex bison libssl-dev device-tree-compiler libncurses-dev

      - name: Compile U-Boot
        run: |
          SOC=mt7981 BOARD=cmcc_rax3000m MULTI_LAYOUT=1 ./build.sh

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: MT7981-CMCC-RAX3000M-NAND-Uboot
          path: ./output/
          retention-days: 30
